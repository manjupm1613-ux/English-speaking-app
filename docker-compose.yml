version: '3.8'\n\nservices:\n  postgres:\n    image: postgres:latest\n    environment:\n      POSTGRES_USER: example_user\n      POSTGRES_PASSWORD: example_password\n      POSTGRES_DB: example_db\n    ports:\n      - '5432:5432'\n\n  redis:\n    image: redis:latest\n    ports:\n      - '6379:6379'\n\n  nodejs-backend:\n    build: ./path-to-nodejs-backend\n    environment:\n      DATABASE_URL: postgres://example_user:example_password@postgres:5432/example_db\n    ports:\n      - '3000:3000'\n    depends_on:\n      - postgres\n      - redis\n